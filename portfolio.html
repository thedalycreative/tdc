<!doctype html>
<html lang="en">
	<head>
		<!--===== HEAD TAGS =====-->
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!--Page Title-->
		<title>Work | The Daly Creative</title>
		<!--Description-->
		<meta
			name="description"
			content="Explore our portfolio of creative projects, brand identities, web development, and AI solutions."
		/>
		<!--Favicon-->
		<link rel="icon" type="image/png" href="/logos/tdc-icon 256x256.png" />
		<!--Bootstrap Icons-->
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
		/>
		<!--Main Stylesheet-->
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<!-- ===== NAV BAR ===== -->
		<div id="navbar"></div>

		<!-- ===== WORK PLACEHOLDER SECTION ===== -->
		<section class="work-placeholder">
			<div class="placeholder-content">
				<img
					src="logos/TDC Logo with Text.png"
					alt="The Daly Creative Logo"
					class="placeholder-logo"
				/>
				<h1>Our Work</h1>
				<p class="placeholder-text">
					We're building something special here. Check back soon to see our latest
					projects, case studies, and creative work.
				</p>
				<div class="placeholder-icon">
					<i class="bi bi-hourglass-split"></i>
				</div>
				<a href="index.html#services" class="cta-button">Explore Services</a>
			</div>
		</section>

		<!-- ===== FOOTER SECTION ===== -->
		<div id="footer"></div>

		<!-- ===== >>> NAVBAR INCLUDE >>> ===== -->
		<script>
			fetch("-navbar.html")
				.then((response) => response.text())
				.then((html) => {
					const navbar = document.getElementById("navbar");
					if (navbar) {
						navbar.innerHTML = html;
					}
				})
				.catch((error) => {
					console.error("Navbar load failed:", error);
				});
		</script>

		<!-- ===== >>> FOOTER INCLUDE >>> ===== -->
		<script>
			fetch("-footer.html")
				.then((response) => response.text())
				.then((html) => {
					const footer = document.getElementById("footer");
					if (footer) {
						footer.innerHTML = html;
					}
				})
				.catch((error) => {
					console.error("Footer load failed:", error);
				});
		</script>

		<!-- ===== >>> SCRIPTS >>> ===== -->
		<script>
			// Smooth scroll for navigation links
			document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
				anchor.addEventListener("click", function (e) {
					e.preventDefault();
					const target = document.querySelector(this.getAttribute("href"));
					if (target) {
						target.scrollIntoView({ behavior: "smooth", block: "start" });
					}
				});
			});
		</script>
		<!-- ===== <<< SCRIPTS <<< ===== -->
	</body>
</html>
